version: "3.9"

services:

  api:
    build: ./api
    container_name: demo-api
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: demo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - api

  jenkins:
    build: ./jenkins
    container_name: demo-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - app-network

volumes:
  jenkins-data:

networks:
  app-network:
    driver: bridge
